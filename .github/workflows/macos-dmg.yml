name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to upload the DMG to, for example v0.1.1"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build unsigned macOS DMG
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: npm run version:sync -- --check

      - name: Test
        run: npm test

      - name: Build DMG
        run: npm run package:macos

      - name: List DMG files
        run: ls -lh src-tauri/target/release/bundle/dmg/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VeloWrite-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload DMG to release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" src-tauri/target/release/bundle/dmg/*.dmg --clobber
