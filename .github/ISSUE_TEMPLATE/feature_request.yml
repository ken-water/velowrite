name: Feature request
description: Suggest an improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should VeloMD do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editing
        - Preview
        - File management
        - Local history
        - Export/publishing
        - AI
        - Sync
        - Packaging
        - Documentation
    validations:
      required: true
